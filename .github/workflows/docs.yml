name: Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Required to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment. Cancel in-progress runs on the same ref,
# but never cancel a deploy already pushing to pages.
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Sphinx site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so source links resolve

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.13"

      - name: Install dependencies (runtime + docs)
        # The docs autodoc imports both packages — install everything.
        run: uv sync --all-extras --group docs

      - name: Build HTML
        # `--keep-going` surfaces every warning in one pass.
        # We don't use `-W` yet — autodoc pulls inherited PyG MessagePassing
        # docstrings whose cross-refs can't resolve here; tighten once those
        # are cleaned up.
        run: |
          uv run sphinx-build \
            -b html \
            --keep-going -n \
            docs docs/_build/html

      - name: Check external links
        # Non-fatal: don't block PRs/deploys on third-party flakiness.
        continue-on-error: true
        run: |
          uv run sphinx-build \
            -b linkcheck \
            docs docs/_build/linkcheck

      - name: Upload artifact (preview)
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html
          retention-days: 14

      - name: Upload Pages artifact
        # Only the main-branch build feeds the deploy job.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
